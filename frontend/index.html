<!DOCTYPE html>
<html>

<head>

    <title>AI User Story Evaluation</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

    <header>

        <h1>AI User Story Evaluation</h1>

    </header>


    <div class="container">

        <div class="upload-card">

            <input type="file" id="excelFile">

            <select id="modelSelect">
                <option value="openai">OpenAI</option>
                <option value="gemini">Gemini</option>
                <option value="llama">Llama</option>
            </select>

            <button id="evaluateBtn">Evaluate</button>

        </div>



        <div class="metrics-grid">

            <div class="metric">
                <h3>Accuracy</h3>
                <p id="accuracy">0</p>
            </div>

            <div class="metric">
                <h3>Precision</h3>
                <p id="precision">0</p>
            </div>

            <div class="metric">
                <h3>Recall</h3>
                <p id="recall">0</p>
            </div>

            <div class="metric">
                <h3>F1 Score</h3>
                <p id="f1">0</p>
            </div>

        </div>



        <div class="chart-section">

            <h2>Metrics Graph</h2>

            <div id="allCharts" class="charts-grid"></div>

        </div>




        <div class="table-section">

            <h2>Evaluation Result</h2>

            <table id="resultTable">

                <thead>

                    <tr>

                        <th>User Story</th>
                        <th>Actual</th>
                        <th>Predicted</th>
                        <th>Match</th>
                        <th>Actions</th>
                    </tr>

                </thead>

                <tbody>

                </tbody>

            </table>

        </div>

    </div>
    <div id="popup" class="popup">
        <div class="popup-box">
            <span class="close" onclick="closePopup()">✖</span>
            <p id="popupContent"></p>
        </div>
    </div>


    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/fileUpload.js"></script>
    <script src="js/llmSelector.js"></script>
    <script src="js/tableRenderer.js"></script>
    <script src="js/evaluation.js"></script>

</body>

</html>
